# configs/prometheus.yml
global:
  scrape_interval: 10s # Как часто забирать метрики
  evaluation_interval: 10s

scrape_configs:
  - job_name: "fastapi_nlp_service"
    metrics_path: "/metrics"
    static_configs:
      # Имя контейнера API из нашего docker-compose и его порт
      - targets: ["industrial_nlp_template_api_server:8000"]