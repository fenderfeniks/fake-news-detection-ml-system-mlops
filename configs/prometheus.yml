# configs/prometheus.yml
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "fastapi_nlp_service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["fake_news_api_server:8000"]  # имя контейнера из docker-compose

  # k8s: автообнаружение подов с аннотацией prometheus.io/scrape: "true"
  - job_name: "kubernetes_pods"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["ml-pipelines"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2

  - job_name: "kube-state-metrics"
    static_configs:
      - targets: ["kube-state-metrics.ml-pipelines.svc.cluster.local:8080"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]  # node-exporter использует hostNetwork