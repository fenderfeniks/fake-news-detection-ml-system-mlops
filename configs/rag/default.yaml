# configs/rag/default.yaml

# Папка, где лежат сырые документы бизнеса (PDF, TXT)
documents_dir: "${paths.data_dir}/raw/knowledge_base"

# Папка, куда LlamaIndex сохранит векторную базу (индексы FAISS)
persist_dir: "${paths.data_dir}/processed/vector_db"

indexer:
  _target_: src.core.rag.indexer.RAGIndexer
  documents_dir: ${paths.data_dir}/raw/knowledge_base
  persist_dir: ${paths.data_dir}/processed/vector_db
  chunk_size: 512
  chunk_overlap: 50

  embedding_model_name: "sentence-transformers/all-MiniLM-L6-v2"
  vector_dimension: 384   
  hnsw_m: 32              

# Добавлен узел ретривера для инстанцирования в API
retriever:
  _target_: src.core.rag.retriever.RAGRetriever
  persist_dir: ${paths.data_dir}/processed/vector_db
  similarity_top_k: ${rag.similarity_top_k}
  
# Настройки ретривера
similarity_top_k: 3 # Сколько самых релевантных кусков текста доставать