# configs/data/default.yaml

# --- 1. Базовые параметры ---
defaults:
  - source: kaggle_dataset

paths: ${paths}

text_column: "text"      # Исправлено для задачи классификации
target_column: "label"   # Исправлено для задачи классификации
max_length: 512
val_split_size: 0.1

seed: ${seed}

preprocessing_num_workers: 4    # Количество ядер процессора для очистки
preprocessing_batch_size: 1000  # Размер чанка для параллельного map

# --- 2. Пайплайн очистки ---
cleaner:
  _target_: src.core.data.cleaners.TextCleaningPipeline
  cleaners:
    - _target_: src.core.data.cleaners.RegexCleaner
      pattern: "<.*?>"
      replacement: " "
    - _target_: src.core.data.cleaners.RegexCleaner
      pattern: "\\s+" # Убираем лишние пробелы
      replacement: " "

# --- 3. Коллатор ---
collator:
  _target_: src.core.data.collators.DynamicTextCollator
  max_length: ${data.max_length}          # Ссылаемся на параметр выше
  text_column: ${data.text_column}        # Ссылаемся на параметр выше
  target_column: ${data.target_column}    # Ссылаемся на параметр выше
  is_causal_lm: ${model.is_causal_lm}     # Интерполяция: тянем из конфига модели

# --- 4. Настройки DataLoader ---
dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: 16
  num_workers: 4
  pin_memory: True

# --- 5. Сам DataModule ---
datamodule:
  _target_: src.core.data.NLPDataModule
  # Сюда мы передадим data_cfg и tokenizer уже внутри кода (через instantiate)