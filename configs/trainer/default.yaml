# configs/trainer/default.yaml
_target_: pytorch_lightning.Trainer

max_epochs: 5
accelerator: "gpu"
devices: 1
precision: "bf16-mixed" # Индустриальный стандарт ускорения

# 1. Интеграция с MLflow
logger: ${logger}

# 2. Сохранение артефактов (Чекпоинтов моделей)
callbacks:
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: "${paths.log_dir}/checkpoints"
    filename: "best-checkpoint-{epoch:02d}-{val_loss:.2f}"
    monitor: "val_f1" # Следим за F1, а не за Loss
    mode: "max"
    save_top_k: 1
    
  - _target_: pytorch_lightning.callbacks.EarlyStopping
    monitor: "val_f1"
    patience: 3
    mode: "max"