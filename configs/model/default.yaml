defaults:
  - _self_
  - architecture: bert_classifier

tokenizer:
  _target_: src.core.models.tokenization.HFTokenizerBuilder
  tokenizer_name: ${model.model_name}
  use_fast: True
  padding_side: "right"
  add_eos_token: False

builder:
  _target_: src.core.models.builder.HFModelBuilder
  model_name_or_path: ${model.model_name}
  cache_dir: "${paths.hf_cache_dir}"
  trust_remote_code: False
  auto_model_class: "transformers.AutoModel" 
  torch_dtype: "auto"

generation:
  _target_: src.core.models.generation.HFTextGenerator
  generation_kwargs:
    max_new_tokens: 256
    temperature: 0.7
    top_p: 0.9
    do_sample: True
    repetition_penalty: 1.1

cleaner:
  _target_: src.core.models.parsers.ResponseCleaner
  strip_prompt: true
  remove_special_tokens: true
  remove_extra_spaces: true
  trim_incomplete_sentence: true