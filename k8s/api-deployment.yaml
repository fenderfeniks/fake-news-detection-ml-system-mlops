apiVersion: apps/v1
kind: Deployment
metadata:
  name: industrial-nlp-api
  namespace: ml-pipelines
  labels:
    app: nlp-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nlp-api
  template:
    metadata:
      labels:
        app: nlp-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: fastapi-server
        image: my-company/industrial_nlp_template:api-latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: nlp-api-secrets
        - configMapRef:
            name: nlp-api-config
        volumeMounts:
        - name: model-weights
          mountPath: /app/models
        - name: data-volume
          mountPath: /app/data
        - name: mlruns-volume
          mountPath: /app/mlruns
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
          limits:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: "1"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
      volumes:
      - name: model-weights
        persistentVolumeClaim:
          claimName: pvc-models
      - name: data-volume
        persistentVolumeClaim:
          claimName: pvc-data
      - name: mlruns-volume
        persistentVolumeClaim:
          claimName: pvc-mlruns